<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation - OptiCrop</title>

    <style>
        body {
            background-image: url("{{ url_for('static', filename='farm-land-green-fields-purple-sky-landscape-meadow-pine-3840x2400-4476.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.8);
            width: 50%;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
        }

        p {
            font-size: 1.1em;
        }

        .input-group {
            margin: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 1.1em;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1.1em;
            background-color: green;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background-color: rgba(0, 0, 0, 0.6);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background-color: white;
            padding: 40px;
            width: 350px;

            text-align: center;

            border-radius: 20px;
        }

        .popup-box h1 {
            color: green;
            font-size: 3em;
        }

        .popup-box button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;

            background-color: green;
            color: white;

            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Crop Recommendation</h1>

        <p>Enter the soil and environmental conditions below.</p>

        <form action="/predict" method="POST">

            <div class="input-group">
                <label for="N">Nitrogen (N)</label>
                <input type="number" id="N" name="N" required>
            </div>

            <div class="input-group">
                <label for="P">Phosphorus (P)</label>
                <input type="number" id="P" name="P" required>
            </div>

            <div class="input-group">
                <label for="K">Potassium (K)</label>
                <input type="number" id="K" name="K" required>
            </div>

            <div class="input-group">
                <label for="temperature">Temperature (°C)</label>
                <input type="number"
                       step="any"
                       id="temperature"
                       name="temperature"
                       required>
            </div>

            <div class="input-group">
                <label for="humidity">Humidity (%)</label>
                <input type="number"
                       step="any"
                       id="humidity"
                       name="humidity"
                       required>
            </div>

            <div class="input-group">
                <label for="ph">Soil pH</label>
                <input type="number"
                       step="any"
                       id="ph"
                       name="ph"
                       required>
            </div>

            <div class="input-group">
                <label for="rainfall">Rainfall (mm)</label>
                <input type="number"
                       step="any"
                       id="rainfall"
                       name="rainfall"
                       required>
            </div>

            <button type="submit">Recommend Crop</button>

        </form>

    </div>
    {% if crop %}

    <div class="popup-overlay" id="popup">

        <div class="popup-box">
            <h2>Crop Recommended!</h2>

            <p>The recommended crop is:</p>

            <h1>{{ crop }}</h1>

            <button onclick="closePopup()">Close</button>
        </div>

    </div>

    {% endif %}
    <script>
        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

</body>
</html>
